<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Petstore App</mat-card-title>
      <mat-card-subtitle>Silakan login untuk melanjutkan</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form #loginForm="ngForm" (ngSubmit)="onLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input
            matInput
            type="text"
            [(ngModel)]="credentials.username"
            name="username"
            required
            placeholder="Masukkan username"
            #usernameField="ngModel"
          />
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="usernameField.invalid && usernameField.touched">
            Username wajib diisi
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="credentials.password"
            name="password"
            required
            placeholder="Masukkan password"
            #passwordField="ngModel"
          />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="passwordField.invalid && passwordField.touched">
            Password wajib diisi
          </mat-error>
        </mat-form-field>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width login-btn"
          [disabled]="loginForm.invalid || isLoading"
        >
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Login</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
