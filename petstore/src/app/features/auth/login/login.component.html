<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Petstore App</mat-card-title>
      <mat-card-subtitle>Silakan login untuk melanjutkan</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput type="text" formControlName="username" placeholder="Masukkan username" />
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="username?.hasError('required')"> Username wajib diisi </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Masukkan password"
          />
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password?.hasError('required')"> Password wajib diisi </mat-error>
        </mat-form-field>

        <mat-error *ngIf="errorMessage" class="api-error">
          {{ errorMessage }}
        </mat-error>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width login-btn"
          [disabled]="loginForm.invalid || isLoading"
        >
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Login</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
