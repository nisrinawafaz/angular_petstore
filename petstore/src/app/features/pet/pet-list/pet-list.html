<mat-card class="list-card">
  <div class="list-header">
    <div>
      <h2>Daftar Pet</h2>
      <p class="subtitle">Kelola semua data pet</p>
    </div>
    <button mat-raised-button class="btn-orange" (click)="openCreate()">
      <mat-icon>add</mat-icon> Tambah Pet
    </button>
  </div>

  <mat-divider></mat-divider>

  <div class="filter-wrapper">
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filter Status</mat-label>
      <mat-select [(ngModel)]="selectedStatuses" multiple (selectionChange)="onStatusChange()">
        <mat-option *ngFor="let s of statusOptions" [value]="s">
          {{ s | titlecase }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="40" color="warn"></mat-spinner>
  </div>

  <div class="table-container" *ngIf="!isLoading">
    <table mat-table [dataSource]="paginatedPets" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nama</th>
        <td mat-cell *matCellDef="let pet">{{ pet.name }}</td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Kategori</th>
        <td mat-cell *matCellDef="let pet">{{ pet.category?.name || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let pet">
          <span class="status-badge" [ngClass]="pet.status">
            {{ pet.status | titlecase }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Aksi</th>
        <td mat-cell *matCellDef="let pet">
          <button
            mat-icon-button
            class="icon-btn-view"
            (click)="openDetail(pet)"
            matTooltip="Detail"
          >
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button class="icon-btn-edit" (click)="openEdit(pet)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            class="icon-btn-delete"
            (click)="openDelete(pet)"
            matTooltip="Hapus"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-state" [colSpan]="displayedColumns.length">Tidak ada data pet</td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalPets"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25, 50]"
      [pageIndex]="pageIndex"
      (page)="onPageChange($event)"
      showFirstLastButtons
    ></mat-paginator>
  </div>
</mat-card>
