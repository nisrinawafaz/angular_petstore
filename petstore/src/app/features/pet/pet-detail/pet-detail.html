<div class="detail-wrapper">
  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <mat-card class="detail-card" *ngIf="!isLoading && pet">
    <mat-card-header>
      <mat-card-title>{{ pet.name }}</mat-card-title>
      <mat-card-subtitle>ID: {{ pet.id }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <!-- Status -->
      <div class="info-row">
        <span class="label">Status</span>
        <span class="status-badge" [ngClass]="pet.status">
          {{ pet.status | titlecase }}
        </span>
      </div>

      <mat-divider></mat-divider>

      <!-- Category -->
      <div class="info-row">
        <span class="label">Kategori</span>
        <span>{{ pet.category?.name || '-' }}</span>
      </div>

      <mat-divider></mat-divider>

      <!-- Tags -->
      <div class="info-row">
        <span class="label">Tags</span>
        <div class="tags-container">
          <mat-chip *ngFor="let tag of pet.tags">{{ tag.name }}</mat-chip>
          <span *ngIf="!pet.tags?.length">-</span>
        </div>
      </div>

      <mat-divider></mat-divider>

      <!-- Photo -->
      <div class="info-row" *ngIf="pet.photoUrls.length">
        <span class="label">Foto</span>
        <div class="photos">
          <img
            *ngFor="let url of pet.photoUrls"
            [src]="url"
            [alt]="pet.name"
            class="pet-photo"
            (error)="$any($event.target).style.display = 'none'"
          />
        </div>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-stroked-button (click)="router.navigate(['/pets'])">
        <mat-icon>arrow_back</mat-icon> Kembali
      </button>
      <button mat-raised-button color="accent" (click)="goToEdit()">
        <mat-icon>edit</mat-icon> Edit
      </button>
      <button mat-raised-button color="warn" (click)="deletePet()">
        <mat-icon>delete</mat-icon> Hapus
      </button>
    </mat-card-actions>
  </mat-card>
</div>
