<mat-card class="form-card">
  <mat-card-header>
    <mat-card-title>Buat Order Baru</mat-card-title>
    <mat-card-subtitle>Isi informasi order</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="orderForm" (ngSubmit)="onSubmit()">
      <!-- Pet Autocomplete -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Pet</mat-label>
        <input
          matInput
          formControlName="pet"
          placeholder="Cari pet berdasarkan nama"
          [matAutocomplete]="petAuto"
        />
        <mat-icon matSuffix>pets</mat-icon>
        <mat-autocomplete #petAuto="matAutocomplete" [displayWith]="displayPet">
          <mat-option *ngFor="let p of filteredPets$ | async" [value]="p">
            {{ p.name }}
            <span class="pet-option-id"> — ID: {{ p.id }}</span>
          </mat-option>
        </mat-autocomplete>
      </mat-form-field>

      <!-- Quantity -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Quantity</mat-label>
        <input matInput type="number" formControlName="quantity" placeholder="Jumlah" />
        <mat-icon matSuffix>shopping_cart</mat-icon>
        <mat-error *ngIf="quantity?.hasError('zodError')">{{
          quantity?.getError('zodError')
        }}</mat-error>
      </mat-form-field>

      <!-- Ship Date -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Ship Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="shipDate" />
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
        <mat-error *ngIf="shipDate?.hasError('zodError')">{{
          shipDate?.getError('zodError')
        }}</mat-error>
      </mat-form-field>

      <!-- Status -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Status</mat-label>
        <mat-select formControlName="status">
          <mat-option *ngFor="let s of statusOptions" [value]="s">
            {{ s | titlecase }}
          </mat-option>
        </mat-select>
        <mat-error *ngIf="status?.hasError('zodError')">{{
          status?.getError('zodError')
        }}</mat-error>
      </mat-form-field>

      <!-- Complete -->
      <mat-checkbox formControlName="complete" class="complete-checkbox">
        Tandai sebagai selesai
      </mat-checkbox>

      <!-- Actions -->
      <div class="actions">
        <button mat-stroked-button type="button" (click)="router.navigate(['/orders'])">
          Batal
        </button>
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="orderForm.invalid || isLoading"
        >
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Buat Order</span>
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
