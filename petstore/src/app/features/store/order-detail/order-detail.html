<div class="loading-container" *ngIf="isLoading">
  <mat-spinner diameter="40"></mat-spinner>
</div>

<mat-card class="detail-card" *ngIf="!isLoading && order">
  <mat-card-header>
    <mat-card-title>Order #{{ order.id }}</mat-card-title>
    <mat-card-subtitle>Detail informasi order</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="info-row">
      <span class="label">Pet ID</span>
      <span>{{ order.petId }}</span>
    </div>
    <mat-divider></mat-divider>

    <div class="info-row">
      <span class="label">Quantity</span>
      <span>{{ order.quantity }}</span>
    </div>
    <mat-divider></mat-divider>

    <div class="info-row">
      <span class="label">Ship Date</span>
      <span>{{ order.shipDate | date: 'dd MMM yyyy, HH:mm' }}</span>
    </div>
    <mat-divider></mat-divider>

    <div class="info-row">
      <span class="label">Status</span>
      <span class="status-badge" [ngClass]="order.status">
        {{ order.status | titlecase }}
      </span>
    </div>
    <mat-divider></mat-divider>

    <div class="info-row">
      <span class="label">Selesai</span>
      <mat-icon [style.color]="order.complete ? '#2e7d32' : '#9e9e9e'">
        {{ order.complete ? 'check_circle' : 'radio_button_unchecked' }}
      </mat-icon>
    </div>
  </mat-card-content>

  <mat-card-actions>
    <button mat-stroked-button (click)="router.navigate(['/orders'])">
      <mat-icon>arrow_back</mat-icon> Kembali
    </button>
    <button mat-raised-button color="warn" (click)="deleteOrder()">
      <mat-icon>delete</mat-icon> Hapus
    </button>
  </mat-card-actions>
</mat-card>
